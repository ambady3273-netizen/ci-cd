name: CI/CD Stages Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        run: echo "Building HTML project..."

  test:
    runs-on: ubuntu-latest
    needs: build   # runs after build
    steps:
      - name: Test
        run: echo "Running tests..."

  deploy:
    runs-on: ubuntu-latest
    needs: test   # runs after test
    steps:
      - name: Deploy
        run: echo "Deploying website..."